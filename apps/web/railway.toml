[build]
builder = "RAILPACK"
buildCommand = "pnpm --filter web... build"
watchPatterns = [
  "apps/web/**",
  "packages/ui/**",
  "packages/types/**",
  "packages/validators/**",
  "package.json",
  "pnpm-lock.yaml",
  "turbo.json"
]

[deploy]
startCommand = "node apps/web/.output/server/index.mjs"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.multiRegionConfig]
[deploy.multiRegionConfig.us-east4-eqdc4a]
numReplicas = 1
