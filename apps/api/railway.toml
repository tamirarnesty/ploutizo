[build]
builder = "RAILPACK"
buildCommand = "pnpm --filter api... build"
watchPatterns = [
  "apps/api/**",
  "packages/db/**",
  "packages/types/**",
  "packages/validators/**",
  "package.json",
  "pnpm-lock.yaml",
  "turbo.json",
  "drizzle.config.ts"
]

[deploy]
preDeployCommand = ["pnpm db:migrate"]
startCommand = "node apps/api/dist/index.js"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.multiRegionConfig]
[deploy.multiRegionConfig.us-east4-eqdc4a]
numReplicas = 1
