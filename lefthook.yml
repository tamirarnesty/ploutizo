pre-commit:
  parallel: true
  commands:
    block-main:
      priority: 1
      run: |
        branch=$(git branch --show-current)
        if [ "$branch" = "main" ] || [ "$branch" = "master" ]; then
          echo "error: direct commits to $branch are not allowed — create a feature branch first"
          exit 1
        fi
    lint:
      run: pnpm turbo lint

    typecheck:
      run: pnpm turbo typecheck

    format-check:
      run: pnpm turbo format:check
